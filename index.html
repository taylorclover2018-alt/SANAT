<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Sistema Transporte</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <h2>Login</h2>
    <input type="text" id="login-user" placeholder="Usuário">
    <input type="password" id="login-pass" placeholder="Senha">
    <button onclick="login()">Entrar</button>
  </div>
</div>

<div id="app" style="display:none;">
  <header>
    <h1>Sistema Transporte Universitário</h1>
    <div>
      <span id="user-info"></span>
      <button onclick="logout()">Sair</button>
    </div>
  </header>

  <section>
    <h2>Novo Rateio</h2>
    <input type="text" id="descricao" placeholder="Descrição">
    <input type="number" id="auxilio" placeholder="Auxílio Total">
    <button onclick="adicionarRateio()">Adicionar</button>
  </section>

  <section>
    <h2>Histórico</h2>
    <div id="historico"></div>
  </section>

  <section>
    <h2>Dashboard</h2>
    <canvas id="grafico" width="400" height="200"></canvas>
  </section>
</div>

<script src="app.js"></script>
</body>
</html>
