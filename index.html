<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transporte Pro | Premium</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen" class="login-screen">
    <div class="login-card">
        <h1>Transporte Pro</h1>
        <p>Sistema Inteligente de Rateio</p>

        <input type="text" id="loginUser" placeholder="Usuário">
        <input type="password" id="loginPass" placeholder="Senha">
        <button onclick="fazerLogin()">Entrar no Sistema</button>
        <span id="loginErro"></span>
    </div>
</div>

<!-- SISTEMA -->
<div id="app" class="hidden">

<header>
    <div class="logo">
        <h2>Transporte Pro</h2>
        <span id="usuarioInfo"></span>
    </div>
    <button class="btn-logout" onclick="logout()">Sair</button>
</header>

<section class="dashboard">
    <div class="card">
        <h3>Total de Rateios</h3>
        <span id="statRateios">0</span>
    </div>
    <div class="card">
        <h3>Média de Alunos por Veículo</h3>
        <span id="statMedia">0</span>
    </div>
    <div class="card">
        <h3>Último Usuário</h3>
        <span id="statUsuario">-</span>
    </div>
</section>

<section class="rateio-section">
    <h2>Novo Rateio</h2>
    <input type="number" id="totalAlunos" placeholder="Total de alunos">
    <input type="number" id="totalVeiculos" placeholder="Total de veículos">
    <button onclick="calcularRateio()">Calcular Rateio</button>
    <div id="resultadoRateio"></div>
</section>

<section class="historico-section">
    <div class="historico-header">
        <h2>Histórico</h2>
        <div>
            <button id="btnExportar" onclick="exportarCSV()">Exportar CSV</button>
            <button id="btnLimpar" onclick="limparHistorico()">Limpar</button>
        </div>
    </div>
    <div id="historico"></div>
</section>

</div>

<script src="app.js"></script>
</body>
</html>
